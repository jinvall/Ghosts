<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>👻 Haunted Bobble Lab</title>
<style>
body{
  background:#000;
  color:white;
  font-family:sans-serif;
  text-align:center;
  margin:0;
}
.gallery img{
  max-width:90%;
  margin:20px;
}
#builder{
  margin-top:60px;
  border-top:2px solid #333;
  padding:30px;
}
#stage{
  width:320px;
  height:400px;
  margin:auto;
  background:#111;
  border:2px solid #444;
  position:relative;
  overflow:hidden;
}
.part{
  position:absolute;
  cursor:grab;
  touch-action:none;
}
.controls{
  margin-top:20px;
}
button{
  padding:10px 14px;
  margin:5px;
  font-size:14px;
}
.parts{
  margin-top:20px;
}
.parts img{
  width:60px;
  margin:8px;
  cursor:pointer;
}
</style>
</head>
<body>
<h1>👻 Haunted House 👻</h1>

<div class="gallery">
  <img src="1.png">
  <img src="2.png">
  <img src="3.png">
</div>

<div id="builder">
  <h2>👻 Haunted Bobble Lab</h2>

  <div id="stage">
    <img id="body" class="part" src="body1.png" style="top:180px;left:120px;width:90px">
    <img id="head" class="part" src="head1.png" style="top:100px;left:120px;width:90px">
  </div>

  <div class="controls">
    <button onclick="wobble()">Bobble!</button>
    <button onclick="spin()">Spin</button>
    <button onclick="exportPNG()">Save Creation</button>
  </div>

  <div class="parts">
    <h3>Heads</h3>
    <img src="head1.png" onclick="setHead(this.src)">
    <img src="head2.png" onclick="setHead(this.src)">
    <img src="head3.png" onclick="setHead(this.src)">

    <h3>Bodies</h3>
    <img src="body1.png" onclick="setBody(this.src)">
    <img src="body2.png" onclick="setBody(this.src)">
  </div>
</div>

<script>
let stage=document.getElementById("stage")

function setHead(src){
  document.getElementById("head").src=src
}
function setBody(src){
  document.getElementById("body").src=src
}

function wobble(){
  let h=document.getElementById("head")
  h.animate([
    {transform:'rotate(-14deg)'},
    {transform:'rotate(14deg)'},
    {transform:'rotate(-10deg)'},
    {transform:'rotate(10deg)'},
    {transform:'rotate(-6deg)'},
    {transform:'rotate(6deg)'},
    {transform:'rotate(0deg)'}
  ],{duration:1200})
}

function spin(){
  stage.animate([
    {transform:'rotate(0deg)'},
    {transform:'rotate(360deg)'}
  ],{duration:1200})
}

function exportPNG(){
  html2canvas(stage).then(canvas=>{
    let link=document.createElement("a")
    link.download="bobble.png"
    link.href=canvas.toDataURL()
    link.click()
  })
}

let parts=document.querySelectorAll(".part")
parts.forEach(p=>{
  p.onpointerdown=startDrag
})

let drag=null
let offsetX=0
let offsetY=0

function startDrag(e){
  drag=e.target
  offsetX=e.offsetX
  offsetY=e.offsetY
  document.onpointermove=move
  document.onpointerup=stop
}

function move(e){
  if(!drag)return
  let rect=stage.getBoundingClientRect()
  drag.style.left=(e.clientX-rect.left-offsetX)+"px"
  drag.style.top=(e.clientY-rect.top-offsetY)+"px"
}

function stop(){
  drag=null
  document.onpointermove=null
}
</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</body>
</html>
